<!-- ko if: shouldShowNotice() -->
<div class="folix-login-notice">
    <div class="notice-content">
        <div class="notice-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
        <div class="notice-text">
            <h3 data-bind="i18n: 'Login Required'"></h3>
            <p data-bind="i18n: 'Please log in to complete your purchase and track your order.'"></p>
            <p class="notice-hint" data-bind="i18n: 'Quick login with Google or Facebook'"></p>
        </div>
        <button type="button" class="action primary folix-login-trigger" data-bind="click: bindLoginTrigger">
            <span data-bind="i18n: 'Login Now'"></span>
        </button>
    </div>
</div>
<!-- /ko -->
