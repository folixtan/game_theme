<!--
/**
 * Folix One Step Checkout - Place Order Button Template
 * 
 * 放在 sidebar 中（摘要底部）
 * 直接调用选中支付方式组件的 placeOrder 方法
 */
-->
<div class="folix-place-order place-order-toolbar">
      
    <!-- Place Order 按钮 -->
    <div class="primary">
        <button type="submit"
                id="folix-place-order-btn"
                class="action primary checkout"
                data-bind="
                    click: placeOrder,
                    attr: { title: $t('Place Order') },
                    enable: isPlaceOrderActionAllowed()
                ">
            <span data-bind="i18n: 'Place Order'"></span>
        </button>
    </div>
</div>

<div class="secure-badge-vertical">
   <!-- 紧凑型安全徽章图标（仅图标，无文字） -->
        <svg 
        class="secure-icon-sm"
        xmlns="http://www.w3.org/2000/svg" 
        width="24" 
        height="24" 
        viewBox="0 0 24 24"
        fill="none"
        stroke="white"
        stroke-width="1.4"
        class="secure-icon-sm"
        >
        <!-- 盾牌外框（极简线条） -->
        <path d="M12 3L3 8v10c0 5.55 3.84 10.74 9 12.67 5.16-1.93 9-7.12 9-12.67V8z" />
        <!-- 金色对勾（居中偏下，小巧醒目） -->
        <polyline 
            points="8.5 12.5 11.5 15.5 15.5 11.5" 
            stroke="#FFD700" 
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.6"
        />
        </svg>
  <span class="secure-text-sm">SSL encrypted</span>
</div>
