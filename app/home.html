     <style>
         * { margin: 0; padding: 0; box-sizing: border-box; }
         body { background: #0A1628; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
         .mobile-container { width: 375px; height: 812px; background: #0A1628; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
         .tabs { display: flex; background: #1E293B; flex-shrink: 0; }
         .tab-item { flex: 1; padding: 20px 30px; text-align: center; cursor: pointer; transition: all 0.3s ease; position: relative; }
         .tab-item::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 3px; background: #FFD700; box-shadow: 0 0 10px #FFD700; transition: all 0.3s ease; }
         .tab-item a { color: #94A3B8; font-size: 16px; font-weight: 600; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
         .tab-item.active { background: rgba(255,215,0,0.05); }
         .tab-item.active a { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
         .tab-item.active::after { width: 60%; }
         .menu-content { flex: 1; overflow-y: auto; padding: 20px 16px 100px; background: linear-gradient(180deg, #1E293B 0%, #0A1628 100%); }
         .menu-item { margin: 12px 0; border-radius: 12px; background: linear-gradient(135deg, rgba(30,41,59,0.8) 0%, rgba(15,23,42,0.9) 100%); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; position: relative; }
         .menu-item::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: #FFD700; box-shadow: 0 0 20px #FFD700; transition: all 0.3s ease; z-index: 2; border-radius: 12px 0 0 12px; }
         .menu-item-link { display: flex; align-items: center; padding: 18px 20px; color: #FFFFFF; font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; text-decoration: none; position: relative; z-index: 1; }
         .menu-item-icon { margin-left: auto; color: #94A3B8; font-size: 20px; flex-shrink: 0; }
         .menu-item.active { border-color: #FFD700; box-shadow: 0 0 15px rgba(255,215,0,0.2), inset 0 0 20px rgba(255,215,0,0.05); }
         .menu-item.active::before { width: 4px; }
         .menu-item.active .menu-item-link { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
         .menu-item.active .menu-item-icon { color: #FFD700; transform: rotate(180deg); }
         .menu-item:hover { border-color: rgba(255,215,0,0.3); transform: translateX(4px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
         .menu-item:hover::before { width: 4px; opacity: 0.5; }
         .menu-item:hover .menu-item-icon { color: #FFD700; }
         .menu-item.sale { background: linear-gradient(135deg, rgba(255,59,48,0.15) 0%, rgba(30,41,59,0.8) 100%); border-color: rgba(255,59,48,0.3); }
