  <text x="335" y="575" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1F2937">PUBG Mobile UC</text>
  <text x="335" y="600" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">卡密自动发货，超值套装</text>
  <text x="335" y="635" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#F97316">¥198.00</text>
  <rect x="335" y="645" width="50" height="20" rx="10" fill="url(#greenGradient)"/>
  <text x="345" y="659" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">有货</text>
  <rect x="335" y="680" width="240" height="38" rx="8" fill="url(#blueGradient)"/>
  <text x="410" y="705" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">立即购买</text>
  
  <!-- Product Card 3 -->
  <rect x="600" y="410" width="265" height="320" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="600" y="410" width="265" height="140" rx="8" fill="#8B5CF6" opacity="0.8"/>
  <!-- Badge Direct -->
  <rect x="800" y="420" width="55" height="22" rx="11" fill="url(#primaryGradient)"/>
  <text x="812" y="436" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1E293B">直充</text>
  <text x="615" y="575" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1F2937">VIP 会员月卡</text>
  <text x="615" y="600" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">尊享专属折扣和客服</text>
  <text x="615" y="635" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#F97316">¥298.00</text>
  <text x="695" y="635" font-family="Arial, sans-serif" font-size="14" fill="#9CA3AF" text-decoration="line-through">¥398.00</text>
  <rect x="615" y="645" width="50" height="20" rx="10" fill="url(#greenGradient)"/>
  <text x="625" y="659" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">有货</text>
  <rect x="615" y="680" width="240" height="38" rx="8" fill="url(#blueGradient)"/>
  <text x="690" y="705" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">立即开通</text>
  
  <!-- Product Card 4 -->
  <rect x="880" y="410" width="265" height="320" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="880" y="410" width="265" height="140" rx="8" fill="#3B82F6" opacity="0.8"/>
  <!-- Badge New -->
  <rect x="1080" y="420" width="50" height="22" rx="11" fill="#8B5CF6"/>
  <text x="1092" y="436" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">✨ 新品</text>
  <text x="895" y="575" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1F2937">游戏点卡 100 元</text>
  <text x="895" y="600" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">通用点卡，支持多款游戏</text>
  <text x="895" y="635" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#F97316">¥100.00</text>
  <!-- Out of Stock -->
  <rect x="895" y="645" width="50" height="20" rx="10" fill="#E5E7EB"/>
  <text x="898" y="659" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#6B7280">缺货</text>
  <rect x="895" y="680" width="240" height="38" rx="8" fill="transparent" stroke="#9CA3AF" stroke-width="2"/>
  <text x="970" y="705" font-family="Arial, sans-serif" font-size="14" fill="#9CA3AF">暂时缺货</text>
  
  <!-- ==================== FOOTER ==================== -->
  <rect y="760" width="1200" height="40" fill="#F3F4F6"/>
  <rect y="760" width="1200" height="4" fill="url(#primaryGradient)"/>
  
  <!-- Footer Links -->
  <text x="200" y="782" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">关于我们</text>
  <text x="300" y="782" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">服务条款</text>
  <text x="410" y="782" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">隐私政策</text>
  <text x="520" y="782" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">联系我们</text>
  <text x="620" y="782" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">常见问题</text>
  
  <!-- Copyright -->
  <rect x="800" y="765" width="380" height="30" rx="6" fill="url(#purpleGradient)"/>
  <text x="870" y="785" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">© 2026 PortGame. Powered by Magento</text>
  
</svg>