  <text x="515" y="320" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#3B82F6">立即充值</text>
  
  <!-- Slider Dots -->
  <circle cx="560" cy="310" r="6" fill="#FFFFFF"/>
  <circle cx="578" cy="310" r="6" fill="rgba(255,255,255,0.5)"/>
  
