<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- 渐变定义 - 严格按照浅色主题变量 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF3B30"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    
    <!-- Logo 发光效果 -->
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="#FFFFFF"/>
  
  <!-- ==================== HEADER TOP BAR ==================== -->
  <rect y="0" width="1200" height="40" fill="#F3F4F6"/>
  <rect y="40" width="1200" height="1" fill="#E5E7EB"/>
  
  <!-- Top Bar Left Links -->
  <text x="40" y="26" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">📰 Folix 新闻</text>
  <text x="160" y="26" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">⭐ STAR 奖励</text>
  <text x="280" y="26" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">💬 支持</text>
  
  <!-- Top Bar Right - App & Language -->
  <text x="900" y="26" font-family="Arial, sans-serif" font-size="13" fill="#6B7280">📱 Folix APP</text>
  <rect x="1020" y="10" width="140" height="24" rx="4" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="1035" y="27" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">🇨🇳 ZH / HKD</text>
  
  <!-- ==================== HEADER MAIN BAR ==================== -->
  <rect y="40" width="1200" height="70" fill="#FFFFFF"/>
  <rect y="107" width="1200" height="3" fill="url(#primaryGradient)"/>
  
  <!-- Logo (简化版 PortGame) -->
  <rect x="35" y="50" width="160" height="50" rx="8" fill="none" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.5"/>
  <text x="115" y="82" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" text-anchor="middle" fill="url(#primaryGradient)" filter="url(#logoGlow)">PortGame</text>
  
  <!-- Navigation -->
  <text x="220" y="85" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">🎮 游戏 ▼</text>
  <text x="340" y="85" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">💳 点卡 ▼</text>
  <text x="450" y="85" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">⚡ 游戏直充 ▼</text>
  <text x="600" y="85" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">📱 话费充值</text>
  
  <!-- Search Box -->
  <rect x="740" y="58" width="320" height="36" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  <text x="760" y="82" font-family="Arial, sans-serif" font-size="14" fill="#9CA3AF">搜索游戏、商品...</text>
  <rect x="1040" y="58" width="70" height="36" rx="0 6 6 0" fill="url(#blueGradient)"/>
  <text x="1060" y="82" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">🔍</text>
  
  <!-- Login Button -->
  <rect x="1130" y="55" width="70" height="40" rx="8" fill="url(#blueGradient)"/>
  <text x="1148" y="81" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">登录</text>
  
  <!-- ==================== HERO SLIDER ==================== -->
  <rect x="40" y="130" width="1120" height="200" rx="12" fill="url(#blueGradient)"/>
  <rect x="40" y="130" width="1120" height="200" rx="12" fill="url(#primaryGradient)" opacity="0.1"/>
  
  <!-- Slider Badge -->
  <rect x="480" y="160" width="80" height="24" rx="12" fill="url(#accentGradient)"/>
  <text x="492" y="177" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">限时特惠</text>
  
  <!-- Slider Title -->
  <text x="340" y="220" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#FFFFFF">Mobile Legends 钻石充值</text>
  <text x="420" y="250" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.9)">直充模式，5 分钟快速到账，安全可靠</text>
  
  <!-- Price -->
  <text x="520" y="285" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#FFD700">¥98.00 起</text>
  
  <!-- CTA Button -->
