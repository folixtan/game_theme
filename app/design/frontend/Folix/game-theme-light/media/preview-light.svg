  <circle cx="70" cy="230" r="22" fill="rgba(255,255,255,0.3)"/>
  <text x="63" y="237" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF">‹</text>
  <circle cx="1130" cy="230" r="22" fill="rgba(255,255,255,0.3)"/>
  <text x="1123" y="237" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF">›</text>
  
