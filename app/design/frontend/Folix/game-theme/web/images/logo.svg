<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 动态流动渐变：金色→红色，循环流动 -->
    <linearGradient id="animatedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700">
        <animate attributeName="offset" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FFA500">
        <animate attributeName="offset" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FF3B30">
        <animate attributeName="offset" values="1;0;1" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- 增强版发光滤镜 -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 动态边框渐变 -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700">
        <animate attributeName="offset" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FF3B30">
        <animate attributeName="offset" values="1;0;1" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- 背景（透明） -->
  <rect width="300" height="80" fill="none"/>

  <!-- 装饰性边框（带动态渐变） -->
  <rect x="5" y="5" width="290" height="70" rx="10" 
        fill="none" 
        stroke="url(#borderGradient)" 
        stroke-width="2" 
        opacity="0.3"/>

  <!-- PortGame 标题 -->
  <text x="150" y="52" 
        font-family="Arial Black, Arial, sans-serif" 
        font-size="48" 
        font-weight="900"
        text-anchor="middle" 
        fill="url(#animatedGradient)"
        filter="url(#strongGlow)">
    PortGame
  </text>
</svg>
