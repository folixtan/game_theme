<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 背景：深蓝渐变 -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    
    <!-- 金色渐变 -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="32" cy="32" r="30" fill="url(#bg-gradient)" stroke="#FFD700" stroke-width="2"/>
  
  <!-- 游戏手柄图标 -->
  <g transform="translate(32, 32)">
    <!-- 手柄主体 -->
    <rect x="-18" y="-8" width="36" height="16" rx="8" ry="8" fill="url(#gold-gradient)"/>
    
    <!-- 左侧方向键 -->
    <rect x="-14" y="-6" width="8" height="3" rx="1" ry="1" fill="#1E293B"/>
    <rect x="-11" y="-9" width="3" height="8" rx="1" ry="1" fill="#1E293B"/>
    
    <!-- 右侧按钮 -->
    <circle cx="10" cy="-4" r="2.5" fill="#1E293B"/>
    <circle cx="14" cy="-1" r="2.5" fill="#1E293B"/>
    
    <!-- 中间装饰线 -->
    <line x1="-4" y1="-8" x2="-4" y2="8" stroke="#1E293B" stroke-width="1.5" opacity="0.5"/>
    <line x1="4" y1="-8" x2="4" y2="8" stroke="#1E293B" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- 发光效果 -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.3"/>
</svg>
